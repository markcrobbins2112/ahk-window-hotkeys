; =======================================================================================
; 5. EDGE TRIMMING & PROPORTIONAL SIZING (DISABLED BY DEFAULT)
; =======================================================================================

[ScaleExpand10px]
; Example: Expands the window 10px in all directions while holding center position
keys1=Win+NumpadAdd

[ScaleReduce10px]
keys1=Win+NumpadSub

[TrimTop]
