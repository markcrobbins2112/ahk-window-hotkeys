; =======================================================================================
;                        WINDOW NUDGER CONFIGURATION MATRIX
; =======================================================================================
; SYNTAX: [CommandName] (Active) or [-CommandName] (Disabled)
; keys1=Combo|Filter  (Optional filter like wintitleis=Chrome)
; =======================================================================================
; 
;   #region System
;   Administrative utilities, telemetry dashboards, configuration hot-reloading, and debug tools.
    ;   #region Utilities
    ;   Diagnostic overlay displays, command palettes, and custom context menus.
        [HelpScreen]
            keys1=Win+/
        [CmdPalette]
            keys1=Win+Ctrl+Shift+C
        [WinInfo]
            keys1=Win+Ctrl+/
        [PeekUnderMouse]
        [SysMenu]
            keys1=Win+Ctrl+Shift+S
            ;   Fast extraction of system shortcuts, active layout bounds, and command help definitions.
            ;   Fast extraction of system shortcuts, active layout bounds, and command help definitions.
    ; #endregion Utilities
    ;   #region Clipboard
    ;   Fast extraction of system shortcuts, active layout bounds, and command help definitions.
