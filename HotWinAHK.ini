; =======================================================================================
;                        WINDOW NUDGER CONFIGURATION MATRIX
; =======================================================================================
; SYNTAX: [CommandName] (Active) or [-CommandName] (Disabled)
; keys1=Combo|Filter  (Optional filter like wintitleis=Chrome)
;   #region System
    ; Administrative utilities, telemetry dashboards, configuration hot-reloading, and debug tools.
    ;   #region Utilities
        ; Diagnostic overlay displays, command palettes, and custom context menus.
        [HelpScreen] ; Display this interactive keyboard command reference panel.
            keys1=Win+/
        [CmdPalette] ; Display the interactive fuzzy-search Command Palette for manual trigger / dry run testing.
            keys1=Win+\
        [WinInfo] ; Display active window physical bounds, handle ID, class, and executable name.
            keys1=Win+Ctrl+/
        [PeekUnderMouse] ; Display class of window beneath mouse cursor.
            keys1=Win+Shift+/
        [SysMenu] ; Show popup menu of all system commands to quickly select and run.
            keys1=Win+.
    ; #endregion Utilities
    ;   #region Clipboard
        ; Fast extraction of system shortcuts, active layout bounds, and command help definitions.
        [CopyCommands] ; Copy all available action commands sorted by category to clipboard.
            keys1=Win+Ctrl+\
        [CopyBindings] ; Copy active keybindings dictionary map to clipboard.
            keys1=Win+Ctrl+.
        [CopyCommandsHelp] ; Copy all categorized action commands with full explanations to clipboard.
            keys1=Win+Ctrl+Shift+\
        [CopyCommandsAlpha] ; Copy all available action commands sorted alphabetically to clipboard.
            keys1=Win+Shift+\
        [CopyBindingsAlpha] ; Copy active keybindings map sorted alphabetically by command name to clipboard.
            keys1=Win+Ctrl+Shift+.
        [CopyBindingsLocation] ; Copy active keybindings map grouped by keyboard hardware location to clipboard.
            keys1=Win+Ctrl+Alt+Shift+.
    ; #endregion Clipboard
    ;   #region Engine
        ; Processes controlling suspension toggles, configuration updates, and preference properties.
        [ToggleSuspension] ; Suspend or resume all HotWinAHK modifier triggers instantly.
            keys1=Win+Ctrl+Pause
        [ReloadConfig] ; Hot-reload preferences from HotWinAHK.ini and compile hotkeys dynamically.
            keys1=Win+Ctrl+f5
        [EditConfig] ; Open HotWinAHK.ini configurations in system default text editor.
            keys1=Win+Ctrl+f2
        [ExitProgram] ; Safely terminate the HotWinAHK background orchestrator process.
            keys1=Win+Ctrl+f4
        [RestartProgram] ; Instantly reload and reboot the HotWinAHK execution engine.
            keys1=Win+Ctrl+Alt+f5
        [KeyDiagnostics] ; Verify and test physical modifier combos on keypad and arrow keys.
            keys1=Win+Ctrl+Alt+.
        [KeyQuery] ; Fuzzy query real-time keyboard strokes to identify active command bindings.
            keys1=Win+Alt+\
        [Settings] ; Open the interactive configurations panel to customize sounds, clicks, and tooltips.
            keys1=Win+Ctrl+,
            SilenceAll=false
            SilentOnWinCmds=false
            TipWinCmds=true
        [-CommandTest] ; Start or resume the interactive command-by-command testing walkthrough.
        [-KeyboardTest] ; Start or resume the interactive keyboard keybinding verification test.
    ; #endregion Engine
; #endregion System
;   #region Window
    ; Coordinate placement, boundary states, attribute overrides, and bulk actions on application windows.
    ;   #region Attributes
        ; Attributes including level toggles, frame transparency values, and layout stacking.
        [AlwaysOnTop] ; Toggle Always-On-Top focus pinning attribute on active window frame.
            keys1=Win+Ctrl+T
        [SetOpacity70] ; Set alpha opacity transparency level to 70% on active window frame.
            keys1=Win+Shift+O
        [RemoveOpacity] ; Restore active window opacity to full solid visibility.
            keys1=Win+Alt+Shift+o
        [SendToBack] ; Push active window frame to the bottom of the active desktop stack.
            keys1=Win+Backspace
    ; #endregion Attributes
    ;   #region Tray
        ; State stowing and recovery interfaces driving custom system notification tasks.
        [MinimizeToTray] ; Stow active window into an autonomous system-tray notification process.
            keys1=Win+Shift+PgDn
        [PickFromTray] ; Open stowed window tray instances via right-click contextual list.
            keys1=Win+Shift+PgUp
    ; #endregion Tray
    ;   #region Interactive
        ; Direct user-interactive bounds manipulation features.
        [DragWindow] ; Initiate DragWindow mode: Make window and ones above translucent, move with cursor, click/Enter to place, Esc to cancel.
            keys1=Win+F6
    ; #endregion Interactive
    ;   #region Bulk
        ; Symmetrical state actions applied across multiple target window containers simultaneously.
        [-RestoreAll] ; Restore all desktop windows back to normal size, regardless of maximized/minimized status (excludes docked, hidden or trayed).
        [-RestoreAllMinimized] ; Selectively restore minimized windows back to normal size while leaving maximized windows locked (excludes docked, hidden or trayed).
        [-MaximizeAll] ; Symmetrically maximize all open windows, irrespective of whether they are minimized or restored (excludes docked, hidden or trayed).
        [RestoreAllMaximized] ; Restore all maximized windows to normal size (excludes docked, hidden or trayed).
            keys1=Win+Ctrl+Alt+Shift+[
        [MaximizeAllRestored] ; Maximize all normal/restored windows (excludes docked, hidden or trayed).
            keys1=Win+Ctrl+Alt+]
        [MaximizeAllMinimized] ; Maximize all minimized windows (excludes docked, hidden or trayed).
            keys1=Win+Ctrl+Alt+Shift+]
        [SwapMaximizedRestored] ; Swap window states: restore maximized; maximize normal/restored (excludes docked, hidden or trayed).
            keys1=Win+Shift+]
        [SwapMinimizedRestored] ; Swap window states: restore minimized; minimize normal/restored (excludes docked, hidden or trayed).
            keys1=Win+Shift+-
        [MinimizeAll] ; Minimize all normal and maximized windows (excludes docked, hidden or trayed bounds).
            keys1=Win+-
        [MinimizeAllRestored] ; Minimize all normal/restored windows (excludes docked, hidden or trayed).
            keys1=Win+Ctrl+Alt+-
        [MinimizeAllMaximized] ; Minimize all maximized windows (excludes docked, hidden or trayed).
            keys1=Win+Ctrl+Alt+Shift+-
    ; #endregion Bulk
; #endregion Window
;   #region Home
    ; Target locking, layout footprints, and remote window alignment restorations.
    ;   #region Targeting
        ; Coord tracking and snapping windows to configured reference layouts.
        [SetHome] ; Save active window class/process/fuzzy title signature to persistent home location.
            keys1=Win+Ctrl+ScrollLock
        [ClearHome] ; Delete saved home location configuration for active window.
            keys1=Win+Ctrl+Shift+ScrollLock
        [GoHome] ; Relocate window to its persistent home position.
            keys1=Win+Shift+ScrollLock
        [Home] ; Intelligent Home behavior: Move to home, or restore to pre-homed, or strip home config upon confirmation.
            keys1=Win+ScrollLock
        [HomePeek] ; Momentarily draw a transparent overlay footprint of the window's home location on screen.
            keys1=Win+Alt+ScrollLock
    ; #endregion Targeting
; #endregion Home
;   #region Focus
    ; Z-order stack traversal, fuzzy search pickers, layout history steps, and volumetric spaces.
    ;   #region Cycling
        ; Moving layout focus sequentially across open application processes.
        [NextWindow] ; Cycle focus smoothly forward across open desktop window frames.
            keys1=Win+PgDn
            keys2=Alt+WheelDown
        [PrevWindow] ; Cycle focus smoothly backward across open desktop window frames.
            keys1=Win+PgUp
            keys2=Alt+WheelUp
        [NextClassWindow] ; Cycle focus specifically forward between windows of identical process class.
            keys1=Win+Alt+PgDn
        [PrevClassWindow] ; Cycle focus specifically backward between windows of identical process class.
            keys1=Win+Alt+PgUp
    ; #endregion Cycling
    ;   #region Advanced
        ; Fuzzy title filters, depth layers, and history layout state controllers.
        [FocusDeepestWindow] ; Activate the deepest window in the Z-order list.
            keys1=Win+Ctrl+Backspace
        [WindowPicker] ; Fuzzy-search and filter active GUI windows, instantly focusing selected window.
            keys1=Win+`
            keys2=Win+Ctrl+Tab
        [Desk3d] ; Enable 3D workspace parallax rotation mode, shifting restored windows based on multi-layered depth.
            keys1=Win+Alt+`
        [WindowHistoryPrev] ; Go to the active window's previous position and state in history.
            keys1=Win+Ctrl+PgUp
        [WindowHistoryNext] ; Go to the active window's next position and state in history.
            keys1=Win+Ctrl+PgDn
        [WindowHistoryPick] ; Open a menu of past recorded positions and states to pick and apply.
            keys1=Win+Ctrl+P
    ; #endregion Advanced
; #endregion Focus
;   #region Move
    ; Precision coordinate moves, physical alignment snaps, partition shifts, and layout swaps.
    ;   #region Precision
        ; Moves windows by small offsets (10px, 1px) or aligns centers.
        [Center] ; Move active window to center of screen without sizing changes.
            keys1=Numpad5
        [MoveTadLeft] ; Shift active window left by 1/4 cell width (106 pixels) coarse-scale.
            keys1=Win+Alt+Left
        [MoveTadRight] ; Shift active window right by 1/4 cell width (106 pixels) coarse-scale.
            keys1=Win+Alt+Right
        [MoveTadUp] ; Shift active window up by 1/4 cell height (58 pixels) coarse-scale.
            keys1=Win+Alt+Up
        [MoveTadDown] ; Shift active window down by 1/4 cell height (58 pixels) coarse-scale.
            keys1=Win+Alt+Down
        [MovepxLeft] ; Nudge active window left with 10 pixels fine precision.
            keys1=Win+Shift+Left
        [MovepxRight] ; Nudge active window right with 10 pixels fine precision.
            keys1=Win+Shift+Right
        [MovepxUp] ; Nudge active window up with 5 pixels fine precision.
            keys1=Win+Shift+Up
        [MovepxDown] ; Nudge active window down with 5 pixels fine precision.
            keys1=Win+Shift+Down
    ; #endregion Precision
    ;   #region Align
        ; Snaps windows directly along physical monitor bounds or grid sectors.
        [EdgeLeft] ; Align window to the screen's left border.
            xkeys1=NumpadLeft
            keys1=Shift+Numpad4
        [EdgeRight] ; Align window to the screen's right border.
            xkeys1=NumpadRight
            keys1=Shift+Numpad6
        [EdgeTop] ; Align window to the screen's top border.
            xkeys1=NumpadUp
            keys1=Shift+Numpad8
        [EdgeBottom] ; Align window to the screen's bottom border.
            xkeys1=NumpadDown
            keys1=Shift+Numpad2
        [EdgeTopLeft] ; Align window to the screen's top-left corner.
            xkeys1=NumpadHome
            keys1=Shift+Numpad7
        [EdgeTopRight] ; Align window to the screen's top-right corner.
            xkeys1=NumpadPgUp
            keys1=Shift+Numpad9
        [EdgeBottomLeft] ; Align window to the screen's bottom-left corner.
            xkeys1=NumpadEnd
            keys1=Shift+Numpad1
        [EdgeBottomRight] ; Align window to the screen's bottom-right corner.
            7xkeys1=NumpadPgDn
            keys1=Shift+Numpad3
        [EdgeCenter] ; Position active window to the exact horizontal and vertical center of monitor.
            keys1=NumpadClear
            keys1=Shift+Numpad5
        [EdgeInLeft] ; Set window alignment offset one grid cell from screen left edge.
            keys1=Ctrl+Shift+Numpad4
        [EdgeInRight] ; Set window alignment offset one grid cell from screen right edge.
            keys1=Ctrl+Shift+Numpad6
        [EdgeInTop] ; Set window alignment offset one grid cell from screen top edge.
            keys1=Ctrl+Shift+Numpad8
        [EdgeInBottom] ; Set window alignment offset one grid cell from screen bottom edge.
            keys1=Ctrl+Shift+Numpad2
        [EdgeInTopLeft] ; Align window offset one grid cell from screen top-left corner.
            keys1=Ctrl+Shift+Numpad7
        [EdgeInTopRight] ; Align window offset one grid cell from screen top-right corner.
            keys1=Ctrl+Shift+Numpad9
        [EdgeInBottomLeft] ; Align window offset one grid cell from screen bottom-left corner.
            keys1=Ctrl+Shift+Numpad1
        [EdgeInBottomRight] ; Align window offset one grid cell from screen bottom-right corner.
            keys1=Ctrl+Shift+Numpad3
    ; #endregion Align
    ;   #region MoveToGrid
        ; Slices monitor monitors into fractions and centers windows on selected parts.
        [MoveToGridLeft] ; Shift active window leftward between virtual grid units.
            keys1=Numpad4
        [MoveToGridRight] ; Shift active window rightward between virtual grid units.
            keys1=Numpad6
        [MoveToGridUp] ; Shift active window upward between virtual grid units.
            keys1=Numpad8
        [MoveToGridDown] ; Shift active window downward between virtual grid units.
            keys1=Numpad2
        [MoveToGridTopLeft] ; Shift active window to top-left virtual grid aspects.
            keys1=Numpad7
        [MoveToGridTopRight] ; Shift active window to top-right virtual grid aspects.
            keys1=Numpad9
        [MoveToGridBottomLeft] ; Shift active window to bottom-left virtual grid aspects.
            keys1=Numpad1
        [MoveToGridBottomRight] ; Shift active window to bottom-right virtual grid aspects.
            keys1=Numpad3
    ; #endregion MoveToGrid
    ;   #region JumpGrid
        ; Shifts windows along layout partitions relative to current cells.
        [JumpGridLeft] ; Hop window position to the left virtual grid quartile partition.
            keys1=Ctrl+Numpad4
        [JumpGridRight] ; Hop window position to the right virtual grid quartile partition.
            keys1=Ctrl+Numpad6
        [JumpGridUp] ; Hop window position to the up virtual grid quartile partition.
            keys1=Ctrl+Numpad8
        [JumpGridDown] ; Hop window position to the down virtual grid quartile partition.
            keys1=Ctrl+Numpad2
        [JumpGridTopLeft] ; Hop window position to the top-left virtual grid quartile partition.
            keys1=Ctrl+Numpad7
        [JumpGridTopRight] ; Hop window position to the top-right virtual grid quartile partition.
            keys1=Ctrl+Numpad9
        [JumpGridBottomLeft] ; Hop window position to the bottom-left virtual grid quartile partition.
            keys1=Ctrl+Numpad1
        [JumpGridBottomRight] ; Hop window position to the bottom-right virtual grid quartile partition.
            keys1=Ctrl+Numpad3
    ; #endregion JumpGrid
    ;   #region Interactive
        ; Boundary exchange swaps, hover-relative selections, and menu grid placement.
        [Swap] ; Swap current active window position and size with the window under mouse cursor.
            keys1=Win+Alt+W
        [SwapSize] ; Swap current active window size with the window under mouse cursor.
            keys1=Win+Alt+Q
        [SwapPosition] ; Swap current active window position with the window under mouse cursor.
            keys1=Win+Alt+P
        [SwapPick] ; Interactive swap: hover and press Space on the first window, then the second window, to swap size and position.
            keys1=Win+Alt+Space
        [SwapPickSize] ; Interactive swap: hover and press Space on the first window, then the second window, to swap size only.
            keys1=Win+Alt+Shift+Space
        [SwapPickPosition] ; Interactive swap: hover and press Space on the first window, then the second window, to swap position only.
            keys1=Win+Alt+Ctrl+Space
        [Gridify] ; Show a nested columns-then-rows menu to instant position the window on custom grid bounds.
            keys1=Win+Shift+.
    ; #endregion Interactive
; #endregion Move
;   #region Size
    ; Ratios adjustments, frame trimming, border additions, grid snaps, and grid stretches.
    ;   #region GridBinding
        ; Direct mouse sizing, padding overrides, and scale factors.
        [MouseToGrid] ; Warp window beneath mouse cursor directly to closest grid block.
            keys1=Win+RButton
        [MouseRelativeSize] ; Resize window dynamically relative to cursor movement boundary vectors.
            keys1=Win+LButton
        [SnapToGridEnlarge] ; Grow active window boundaries to span next adjacent grid aspect cell.
            keys1=NumpadAdd
        [SnapToGridShrink] ; Contract active window grid spanning aspect cell size.
            keys1=NumpadSub
        [ScaleExpand10px] ; Expand active window bounds by 10px symmetrically in all directions.
            keys1=Alt+NumpadAdd
        [ScaleReduce10px] ; Shrink active window bounds by 10px symmetrically in all directions.
            keys1=Alt+NumpadSub
        [ScaleExpandGridPart] ; Expand active window bounds symmetrically matching half-grid step parts.
            keys1=Ctrl+NumpadAdd
        [ScaleReduceGridPart] ; Shrink active window bounds symmetrically matching half-grid step parts.
            keys1=Ctrl+NumpadSub
    ; #endregion GridBinding
    ;   #region Trim
        ; Symmetry border trims matching target grid proportions.
        [TrimTop] ; Trim top boundary from active window margin.
            keys1=Win+Shift+Numpad8
        [TrimBottom] ; Trim bottom boundary from active window margin.
            keys1=Win+Shift+Numpad2
        [TrimLeft] ; Trim left boundary from active window margin.
            keys1=Win+Shift+Numpad4
        [TrimRight] ; Trim right boundary from active window margin.
            keys1=Win+Shift+Numpad6
        [TrimAll] ; Symmetrically trim all 4 sides of the active window margin.
            keys1=Win+Shift+Numpad5
        [TrimTopLeft] ; Trim top-left boundaries from active window margins.
            keys1=Win+Shift+Numpad7
        [TrimTopRight] ; Trim top-right boundaries from active window margins.
            keys1=Win+Shift+Numpad9
        [TrimBottomLeft] ; Trim bottom-left boundaries from active window margins.
            keys1=Win+Shift+Numpad1
        [TrimBottomRight] ; Trim bottom-right boundaries from active window margins.
            keys1=Win+Shift+Numpad3
    ; #endregion Trim
    ;   #region Grow
        ; Symmetry border expansions enlarging target sizes.
        [AddTop] ; Grow top boundary outward to nearest grid or midpoint grid cell.
            keys1=Win+Alt+Shift+Numpad8
        [AddBottom] ; Grow bottom boundary outward to nearest grid or midpoint grid cell.
            keys1=Win+Alt+Shift+Numpad2
        [AddLeft] ; Grow left boundary outward to nearest grid or midpoint grid cell.
            keys1=Win+Alt+Shift+Numpad4
        [AddRight] ; Grow right boundary outward to nearest grid or midpoint grid cell.
            keys1=Win+Alt+Shift+Numpad6
        [AddTopLeft] ; Grow top-left boundaries outward to nearest grid margins.
            keys1=Win+Alt+Shift+Numpad7
        [AddTopRight] ; Grow top-right boundaries outward to nearest grid margins.
            keys1=Win+Alt+Shift+Numpad9
        [AddBottomLeft] ; Grow bottom-left boundaries outward to nearest grid margins.
            keys1=Win+Alt+Shift+Numpad1
        [AddBottomRight] ; Grow bottom-right boundaries outward to nearest grid margins.
            keys1=Win+Alt+Shift+Numpad3
        [-AddAll] ; Symmetrically grow all four sides of the window outward to the nearest grid lines.
        [GrowLeft] ; Grow left boundary outward from active window margin by step width.
            keys1=Win+Ctrl+Numpad4
        [GrowRight] ; Grow right boundary outward from active window margin by step width.
            keys1=Win+Ctrl+Numpad6
        [GrowTop] ; Grow top boundary outward from active window margin by step width.
            keys1=Win+Ctrl+Numpad8
        [GrowBottom] ; Grow bottom boundary outward from active window margin by step width.
            keys1=Win+Ctrl+Numpad2
        [GrowAll] ; Symmetrically grow all 4 sides of the active window margin.
            keys1=Win+Ctrl+Numpad5
        [GrowTopLeft] ; Symmetrically grow top-left boundaries of active window.
            keys1=Win+Ctrl+Numpad7
        [GrowTopRight] ; Symmetrically grow top-right boundaries of active window.
            keys1=Win+Ctrl+Numpad9
        [GrowBottomLeft] ; Symmetrically grow bottom-left boundaries of active window.
            keys1=Win+Ctrl+Numpad1
        [GrowBottomRight] ; Symmetrically grow bottom-right boundaries of active window.
            keys1=Win+Ctrl+Numpad3
    ; #endregion Grow
    ;   #region Shrink
        ; Symmetry border contractions shrinking target dimensions.
        [SubtractTop] ; Contract top boundary inward to nearest grid or midpoint grid cell.
            keys1=Win+Ctrl+Alt+Numpad8
        [SubtractBottom] ; Contract bottom boundary inward to nearest grid or midpoint grid cell.
            keys1=Win+Ctrl+Alt+Numpad2
        [SubtractLeft] ; Contract left boundary inward to nearest grid or midpoint grid cell.
            keys1=Win+Ctrl+Alt+Numpad4
        [SubtractRight] ; Contract right boundary inward to nearest grid or midpoint grid cell.
            keys1=Win+Ctrl+Alt+Numpad6
        [SubtractTopLeft] ; Contract top-left boundaries inward toward centers of monitor.
            keys1=Win+Ctrl+Alt+Numpad7
        [SubtractTopRight] ; Contract top-right boundaries inward toward centers of monitor.
            keys1=Win+Ctrl+Alt+Numpad9
        [SubtractBottomLeft] ; Contract bottom-left boundaries inward toward centers of monitor.
            keys1=Win+Ctrl+Alt+Numpad1
        [SubtractBottomRight] ; Contract bottom-right boundaries inward toward centers of monitor.
            keys1=Win+Ctrl+Alt+Numpad3
        [-SubtractAll] ; Symmetrically contract all four sides of the window inward to the nearest grid lines.
    ; #endregion Shrink
    ;   #region HalfDouble
        ; Fast dimension updates scaling window size by 0.5x or 2.0x.
        [HalfSizeLeft] ; Halve window width from the left side.
            keys1=Win+Ctrl+Alt+Shift+Numpad4
        [HalfSizeRight] ; Halve window width from the right side.
            keys1=Win+Ctrl+Alt+Shift+Numpad6
        [HalfSizeTop] ; Halve window height from the top side.
            keys1=Win+Ctrl+Alt+Shift+Numpad8
        [HalfSizeBottom] ; Halve window height from the bottom side.
            keys1=Win+Ctrl+Alt+Shift+Numpad2
        [DoubleSizeLeft] ; Double window width from the left side.
            keys1=NumpadLeft
        [DoubleSizeRight] ; Double window width from the right side.
            keys1=NumpadRight
        [DoubleSizeTop] ; Double window height from the top side.
            keys1=NumpadUp
        [DoubleSizeBottom] ; Double window height from the bottom side.
            keys1=NumpadDown
    ; #endregion HalfDouble
    ;   #region StretchGrid
        ; Stretches target borders onto custom screen segments.
        [StretchToGridLeft] ; Stretch left boundary outward to nearest grid or midpoint grid cell edge.
            keys1=Win+Numpad4
        [StretchToGridRight] ; Stretch right boundary outward to nearest grid or midpoint grid cell edge.
            keys1=Win+Numpad6
        [StretchToGridUp] ; Stretch top boundary outward to nearest grid or midpoint grid cell edge.
            keys1=Win+Numpad8
        [StretchToGridDown] ; Stretch bottom boundary outward to nearest grid or midpoint grid cell edge.
            keys1=Win+Numpad2
        [StretchToGridTopLeft] ; Stretch top-left boundaries toward the nearest grid corners.
            keys1=Win+Numpad7
        [StretchToGridTopRight] ; Stretch top-right boundaries toward the nearest grid corners.
            keys1=Win+Numpad9
        [StretchToGridBottomLeft] ; Stretch bottom-left boundaries toward the nearest grid corners.
            keys1=Win+Numpad1
        [StretchToGridBottomRight] ; Stretch bottom-right boundaries toward the nearest grid corners.
            keys1=Win+Numpad3
        [-StretchToGridAll] ; Symmetrically stretch all four borders of the window outward to the adjacent grid lines.
    ; #endregion StretchGrid
    ;   #region PullGrid
        ; Pulls target margins onto predicted grid lines.
        [PullToGridLeft] ; Pull left boundary inward to nearest grid or midpoint grid cell edge.
            keys1=Win+Alt+Numpad4
        [PullToGridRight] ; Pull right boundary inward to nearest grid or midpoint grid cell edge.
            keys1=Win+Alt+Numpad6
        [PullToGridUp] ; Pull top boundary inward to nearest grid or midpoint grid cell edge.
            keys1=Win+Alt+Numpad8
        [PullToGridDown] ; Pull bottom boundary inward to nearest grid or midpoint grid cell edge.
            keys1=Win+Alt+Numpad2
        [PullToGridTopLeft] ; Pull top-left boundary inward to nearest grid or midpoint grid cell edge.
            keys1=Win+Alt+Numpad7
        [PullToGridTopRight] ; Pull top-right boundary inward to nearest grid or midpoint grid cell edge.
            keys1=Win+Alt+Numpad9
        [PullToGridBottomLeft] ; Pull bottom-left boundary inward to nearest grid or midpoint grid cell edge.
            keys1=Win+Alt+Numpad1
        [PullToGridBottomRight] ; Pull bottom-right boundary inward to nearest grid or midpoint grid cell edge.
            keys1=Win+Alt+Numpad3
        [-PullToGridAll] ; Symmetrically pull all four borders of the window inward to the adjacent grid lines.
    ; #endregion PullGrid
    ;   #region StretchScreenEdge
        ; Expands window borders outward onto screen limits.
        [StretchLeft] ; Extend side width of target window to touch screen left bounds.
            keys1=Win+Ctrl+Shift+Numpad4
        [StretchRight] ; Extend side width of target window to touch screen right bounds.
            keys1=Win+Ctrl+Shift+Numpad6
        [StretchTop] ; Extend top height of target window to touch screen top bounds.
            keys1=Win+Ctrl+Shift+Numpad8
        [StretchBottom] ; Extend bottom height of target window to touch screen bottom bounds.
            keys1=Win+Ctrl+Shift+Numpad2
        [StretchTopLeft] ; Extend top-left coordinate vectors of target window bounds to touch screen margins.
            keys1=Win+Ctrl+Shift+Numpad7
        [StretchTopRight] ; Extend top-right coordinate vectors of target window bounds to touch screen margins.
            keys1=Win+Ctrl+Shift+Numpad9
        [StretchBottomLeft] ; Extend bottom-left coordinate vectors of target window bounds to touch screen margins.
            keys1=Win+Ctrl+Shift+Numpad1
        [StretchBottomRight] ; Extend bottom-right coordinate vectors of target window bounds to touch screen margins.
            keys1=Win+Ctrl+Shift+Numpad3
        [-StretchAll] ; Symmetrically expand all sides of the window outward to fill the monitor workspace edges.
    ; #endregion StretchScreenEdge
; #endregion Size
;   #region Tuck
    ; Marginal docking, off-screen hiding, tactile peek actions, and pop-up picker menus.
    ;   #region Actions
        ; Folds containers under screen edges keeping small peek boundaries visible.
        [TuckLeft] ; Tuck window past left screen wall, exposing a 20px dock indicator bar.
            keys1=Win+Ctrl+Shift+Left
        [TuckRight] ; Tuck window past right screen wall, exposing a 20px dock indicator bar.
            keys1=Win+Ctrl+Shift+Right
        [TuckUp] ; Tuck window past top screen wall, exposing a 20px dock indicator bar.
            keys1=Win+Ctrl+Shift+Up
        [TuckDown] ; Tuck window past bottom screen wall, exposing a 20px dock indicator bar.
            keys1=Win+Ctrl+Shift+Down
        [-BumpEdgeUntuck] ; Trigger untuck peeking when cursor reaches tucked window edge indicator.
            keys1=MouseBump_left
        [-BumpEdgeUntuckActivate] ; Fully restore tucked window when pulled/clicked past the pop-off threshold.
            keys1=MouseBump_right
        [PeekTucked] ; Open interactive menu of all tucked windows to peek or activate.
            keys1=Win+Ctrl+Shift+P
        [Untuck] ; Open interactive menu of all tucked windows to fully untuck them.
            keys1=Win+Ctrl+Shift+U
        [UntuckLeft] ; Untuck the window tucked at the left edge.
            keys1=Win+Ctrl+Alt+Left
        [UntuckRight] ; Untuck the window tucked at the right edge.
            keys1=Win+Ctrl+Alt+Right
        [UntuckTop] ; Untuck the window tucked at the top edge.
            keys1=Win+Ctrl+Alt+Up
        [UntuckBottom] ; Untuck the window tucked at the bottom edge.
            keys1=Win+Ctrl+Alt+Down
        [TuckPeekLeft] ; Reveal/peek tucked windows on the left edge sequentially.
            keys1=Win+Ctrl+Left
        [TuckPeekRight] ; Reveal/peek tucked windows on the right edge sequentially.
            keys1=Win+Ctrl+Right
        [TuckPeekTop] ; Reveal/peek tucked windows on the top edge sequentially.
            keys1=Win+Ctrl+Up
        [TuckPeekBottom] ; Reveal/peek tucked windows on the bottom edge sequentially.
            keys1=Win+Ctrl+Down
        [TuckPeekAll] ; Show interactive popup menu of all tucked windows formatted with HWND labels.
            keys1=Win+Ctrl+`
