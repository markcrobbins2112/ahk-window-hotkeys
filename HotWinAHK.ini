; =======================================================================================
;                        WINDOW NUDGER CONFIGURATION MATRIX
; =======================================================================================
; FILE NAME: au3-hotkeys.ini
; 
; SYNTAX RULES:
;   [CommandName]        -> Active command (Runs when keys match).
;   [-CommandName]       -> Disabled command (Ignored completely by the engine).
;   keys1=Combo|Filter   -> First hotkey assignment with optional conditional filter.
;   keys2=Combo          -> Second hotkey alternative assignment for the SAME command.
;
; FILTER CONDITION CODES:
;   wintitleis=text       wintitlehas=text       wintitlestartswith=text   wintitleendswith=text
;   winclassis=text       winclasshas=text       winexeis=text
;
; ADVANCED KEY MODIFIERS:
;   LCtrl+, RCtrl+, Ctrl+   (Left, Right, or Either side)
;   LShift+, RShift+, Shift+ 
;   LAlt+, RAlt+, Alt+ 
;   LWin+, RWin+, Win+
;   Double+                 (Prefix used to detect a rapid double-press of a modifier)
;
; ---------------------------------------------------------------------------------------
; COMPLETE ENGINE COMMAND REFERENCE (Valid names to use inside square brackets []):
; ---------------------------------------------------------------------------------------
; Administrative:  SuspendEngine, UnsuspendEngine, ToggleSuspension, ReloadConfig, EditConfig
; 1px Moves:       MoveLeft1px, MoveRight1px, MoveUp1px, MoveDown1px, MoveUpLeft1px, 
;                  MoveUpRight1px, MoveDownLeft1px, MoveDownRight1px
; 10px Moves:      MoveLeft10px, MoveRight10px, MoveUp10px, MoveDown10px, MoveUpLeft10px, 
;                  MoveUpRight10px, MoveDownLeft10px, MoveDownRight10px
; Snapping:        SnapLeft, SnapRight, SnapTop, SnapBottom, SnapTopLeft, SnapTopRight, 
;                  SnapBottomLeft, SnapBottomRight, SnapCenter
; Sizing:          ScaleExpand10px, ScaleReduce10px, TrimTop, TrimBottom, TrimLeft, TrimRight,
;                  TrimTopLeft, TrimTopRight, TrimBottomLeft, TrimBottomRight, AddTop, 
;                  AddBottom, AddLeft, AddRight, AddTopLeft, AddTopRight, AddBottomLeft, 
;                  AddBottomRight, MouseRelativeSize, HalfSizeLeft, HalfSizeRight, 
;                  HalfSizeTop, HalfSizeBottom
; System Layer:    AlwaysOnTop, SetOpacity70, RemoveOpacity, SendToBack, MinimizeToTray,
;                  PeekUnderMouse, FocusNextClassInstance, FocusLastActiveWindow
; Mouse Bumps:     MouseBump_top, MouseBump_bottom, MouseBump_left, MouseBump_right,
;                  MouseBump_topLeft, MouseBump_topRight, MouseBump_bottomLeft, MouseBump_bottomRight
; =======================================================================================


; =======================================================================================
; 1. ACTIVE MASTER SYSTEM CONTROLS (Keep these enabled so you can manage the engine!)
; =======================================================================================

[HelpScreen]
keys1=Win+/
[WinInfo]
keys1=Win+Ctrl+/

[CopyCommands]
keys1=Win+Ctrl+C

[CopyBindings]
keys1=Win+Alt+C

[ToggleSuspension]
keys1=Win+Alt+S

[ReloadConfig]
keys1=Win+f12

[EditConfig]
keys1=Win+Alt+E

[ExitProgram]
keys1=Win+Alt+X

[RestartProgram]
keys1=Win+.

; =======================================================================================
; 2. SYSTEM LAYER ACTIONS (DISABLED BY DEFAULT - Remove the leading '-' to activate)
; =======================================================================================

[MouseToGrid]
keys1=Win+RButton

[MouseRelativeSize]
keys1=Win+LButton

[AlwaysOnTop]
keys1=Win+Ctrl+T

[SetOpacity70]
keys1=Win+Shift+O
[RemoveOpacity]
keys1=Win+Alt+Shift+o
[SendToBack]
keys1=Win+Backspace

[FocusLastActiveWindow]
keys1=Win+Shift+Backspace
[FocusDeepestWindow]
keys1=Win+Ctrl+Backspace

[MinimizeToTray]
keys1=Win+Shift+PgDn

[PickFromTray]
keys1=Win+Shift+PgUp

[-PeekUnderMouse]
keys1=Double+LWin+P

[-FocusNextClassInstance]
keys1=Double+LAlt+N



